<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Management System</title>
    <script src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-libs="sap.m,sap.ui.table,sap.ui.layout"
        data-sap-ui-theme="sap_bluecrystal"
        data-sap-ui-bindingSyntax="complex"
        data-sap-ui-resourceroots='{
            "punit": "./"
        }'></script>

    <script>
        // Create and display the App view
        var oView = new sap.ui.view({
            viewName: "punit.view.App",
            type: "XML"
        });

        // Create and add the Main view to the App
        var oMain = new sap.ui.view({
            viewName: "punit.view.Vendor",
            type: "XML"
        });

        oView.byId("idApp").addPage(oMain);
        oView.placeAt("content");
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        #content {
            margin: 20px;
            padding: 20px;
        }

        /* Center the page title */
        .sapMPageTitle {
            text-align: center !important;
        }

        .sapMPageHeader {
            text-align: center !important;
        }

        /* Add padding to the page content */
        .sapMPage {
            padding: 0 20px 20px 20px !important;
        }

        .sapUiLargeMargin {
            margin: 20px 0 !important;
        }

        .sapUiSmallMargin {
            margin: 10px 0 !important;
        }

        /* Responsive margin for panels */
        .sapUiResponsiveMargin {
            margin-right: 0 !important;
            margin-left: 0 !important;
        }
    </style>
</head>

<body class="sapUiBody">
    <div id="content"></div>
</body>
</html>
